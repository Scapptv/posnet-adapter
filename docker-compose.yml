# Posnet — POS-anchored İnteqrasiya Hub (adapter layihəsi)
# AI-0.3: backend substrat (postgres+pgmq, redis, vault, keycloak)
# AI-0.4: observability (otel-collector, jaeger, prometheus, loki, grafana)
# AI-0.5: dev infra (mailpit, minio, caddy)
# QEYD: posnet-help-center AYRI layihədir (posnet_* konteynerlər, port 5433/6380/7700).
# Bu adapter layihəsi → `adapter_*` konteynerlər + standart portlar.
name: adapter

services:
  # ---- Backend substrat (AI-0.3) ----
  postgres:
    # pgmq + pg_trgm üçün xüsusi image (standart postgres-də pgmq YOXDUR)
    image: ghcr.io/pgmq/pg16-pgmq:latest
    container_name: adapter_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-posnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-posnet_dev_pw}  # pragma: allowlist secret
      POSTGRES_DB: ${POSTGRES_DB:-posnet_core}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - adapter_pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-posnet} -d ${POSTGRES_DB:-posnet_core}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: adapter_redis
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - adapter_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.15
    container_name: adapter_vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-root-token}  # pragma: allowlist secret
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "${VAULT_PORT:-8200}:8200"
    command: ["server", "-dev"]
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: adapter_keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}  # pragma: allowlist secret
      KC_HEALTH_ENABLED: "true"
      # Dev owner seed password — substituted into realm-posnet.json at import time
      # (${env.POSNET_OWNER_PASSWORD}); keeps the credential out of the public realm file (A6).
      POSNET_OWNER_PASSWORD: ${POSNET_OWNER_PASSWORD:-owner-dev-2026}  # pragma: allowlist secret
    volumes:
      # AI-1.7: posnet realm imported on start (--import-realm reads this dir).
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
      - "9100:9000"  # management/health (host 9100 → MinIO 9000 ilə toqquşmasın)
    # Keycloak image (ubi-micro) curl/bash daxil etmir → in-container healthcheck etibarsız.
    # Health host-dan yoxlanılır: curl http://localhost:9100/health/ready
    restart: unless-stopped

  # ---- Observability (AI-0.4) ----
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: adapter_otel_collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/otel/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC (app telemetriya)
      - "4318:4318"  # OTLP HTTP
    depends_on:
      - jaeger
      - loki
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: adapter_jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: adapter_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - adapter_prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.1
    container_name: adapter_loki
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - adapter_loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: adapter_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}  # pragma: allowlist secret
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - adapter_grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger
    restart: unless-stopped

  # ---- Dev infra (AI-0.5) ----
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: adapter_mailpit
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: adapter_minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}  # pragma: allowlist secret
    ports:
      - "9000:9000"  # S3 API
      - "9101:9001"  # console (host 9001 tutulub → 9101)
    volumes:
      - adapter_miniodata:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: adapter_minio_init
    depends_on:
      - minio
    environment:
      MC_HOST_local: http://${MINIO_ROOT_USER:-minioadmin}:${MINIO_ROOT_PASSWORD:-minioadmin}@minio:9000  # pragma: allowlist secret
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc ls local >/dev/null 2>&1; do echo 'minio gözlənilir...'; sleep 2; done
        mc mb -p local/posnet-uploads local/posnet-backups
        mc ls local
        echo 'MinIO bucket-lar hazır'
    restart: "no"

  caddy:
    image: caddy:2.8-alpine
    container_name: adapter_caddy
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - adapter_caddy_data:/data
      - adapter_caddy_config:/config
    ports:
      - "8443:443"  # HTTPS (host 80/443 tutulub)
    depends_on:
      - keycloak
      - mailpit
      - minio
      - grafana
      - jaeger
    restart: unless-stopped

volumes:
  adapter_pgdata:
  adapter_redisdata:
  adapter_prometheus_data:
  adapter_loki_data:
  adapter_grafana_data:
  adapter_miniodata:
  adapter_caddy_data:
  adapter_caddy_config:
