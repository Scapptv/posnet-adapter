default_language_version:
  python: python3.12

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # ---- Built-in ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(.*\.md|.*\.lock)$
      - id: end-of-file-fixer
        exclude: ^(.*\.lock)$
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^infra/helm/.*/templates/.*$
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ^.*\.bat$

  # ---- Ruff (lint + format) ----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ---- Mypy (local hook → layihə venv, CI/make ilə eyni; dep maintenance yox) ----
  - repo: local
    hooks:
      - id: mypy
        name: mypy --strict (project venv)
        entry: uv run mypy services libs
        language: system
        pass_filenames: false
        files: ^(services|libs)/.*\.py$
        types: [python]

  # ---- Bandit (security) ----
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -q]
        additional_dependencies: ["bandit[toml]"]
        files: ^(services|libs)/.*\.py$

  # ---- Detect secrets ----
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^(\.secrets\.baseline|uv\.lock|pnpm-lock\.yaml|package-lock\.json)$

  # ---- YAML lint ----
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yml]

  # ---- Conventional Commits ----
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - chore
          - docs
          - refactor
          - test
          - perf
          - ci
          - build
          - revert
