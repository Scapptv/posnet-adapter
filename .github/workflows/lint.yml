name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install deps (Python 3.12 via .python-version)
        run: uv sync --all-extras
      - name: ruff + format (make lint)
        run: make lint
      - name: mypy --strict (make type)
        run: make type

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: eslint + tsc
        run: |
          pnpm -r lint
          pnpm -r typecheck
