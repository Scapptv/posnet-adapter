name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install deps
        run: uv sync --all-extras
      - name: pytest (coverage gate AI-1.1-de 80%-e qalxacaq)
        run: |
          set +e
          uv run pytest
          code=$?
          set -e
          if [ "$code" -ne 0 ] && [ "$code" -ne 5 ]; then exit "$code"; fi
          echo "pytest exit=$code (5 = hele test yox, AI-0)"
