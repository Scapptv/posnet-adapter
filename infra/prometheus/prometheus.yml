# Prometheus — AI-0.4 (services/* scrape AI-1.13-də əlavə olunacaq)
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']  # collector prometheus exporter (app metriklər)

  - job_name: otel-collector-internal
    static_configs:
      - targets: ['otel-collector:8888']  # collector öz telemetriyası
