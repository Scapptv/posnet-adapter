---
extends: default

rules:
  line-length:
    max: 160
    level: warning
  comments:
    min-spaces-from-content: 1
  document-start: disable
  truthy:
    check-keys: false  # GitHub Actions uses 'on:'
  braces:
    max-spaces-inside: 1
  indentation:
    spaces: 2
    indent-sequences: consistent

ignore: |
  infra/helm/**/templates/**
  node_modules/
  .venv/
  build/
  dist/
